<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Timer - 내 책상 위의 작은 요정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Pretendard', 'sans-serif'], 
                        nunito: ['"Nunito"', 'sans-serif'] 
                    },
                    colors: { 
                        momo: { 
                            main: '#F899B3',
                            dark: '#c47a91',
                            text: '#9e6678',
                            bg: '#FFF5F8',
                            lace: '#FDE8EE'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Pretendard', sans-serif; color: #9e6678; overflow-x: hidden; background-color: #FFF5F8; }
        @keyframes float { 
            0% { transform: translateY(0px) rotate(0deg); } 
            50% { transform: translateY(-15px) rotate(1.5deg); } 
            100% { transform: translateY(0px) rotate(0deg); } 
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .btn-shine::after { 
            content: ''; position: absolute; top: 0; width: 50%; height: 100%; 
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%); 
            transform: skewX(-25deg); animation: shine 3s infinite; 
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 200%; } }
        .glass-widget {
            box-shadow: 0 25px 50px -12px rgba(248, 153, 179, 0.25);
            backdrop-filter: blur(12px); border: 2px solid white;
        }
    </style>
</head>
<body class="relative min-h-screen">

    <nav class="w-full px-6 py-10 flex justify-center items-center">
        <div class="font-nunito font-black text-momo-main text-2xl tracking-widest">🎀 MOMO TIMER</div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 flex flex-col lg:flex-row items-center justify-between gap-12 pt-10 pb-24">
        <div class="flex-1 text-center lg:text-left">
            <h1 class="text-4xl sm:text-6xl font-black text-gray-800 leading-tight mb-8 break-keep">
                내 책상 위의<br><span class="text-momo-main font-nunito">작은 요정, Momo Timer</span>
            </h1>
            
            <p class="text-lg text-momo-text mb-12 opacity-90">
                바탕화면 위에 예쁘게 띄워두는<br>프레임리스 타이머로 나만의 공간을 꾸며보세요.
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                <a href="https://github.com/DearMySn1p3r/MomoTimer/releases/download/v1.0.0/MomoTimer.exe" 
                   download
                   class="btn-shine relative overflow-hidden bg-momo-main text-white px-10 py-5 rounded-2xl font-bold text-lg shadow-lg hover:bg-momo-dark hover:-translate-y-1 transition-all flex items-center justify-center gap-3">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-13.051-1.801z"/></svg>
                    Windows v1.0.0 다운로드
                </a>
            </div>
            
            <p class="mt-4 text-xs text-momo-text opacity-50">※ 다운로드 실패 시 브라우저 설정에서 '유지'를 클릭하세요.</p>
        </div>

        <div class="relative animate-float">
            <div class="w-[280px] h-[500px] bg-white/90 rounded-[32px] glass-widget p-6 flex flex-col gap-5 border-2 border-white">
                <div class="text-center text-[10px] font-black text-momo-main tracking-[4px]">MOMO TIMER</div>
                <div class="w-full h-24 rounded-2xl border-2 border-dashed border-momo-main/30 bg-momo-bg flex items-center justify-center text-2xl">📷</div>
                <div class="bg-white rounded-2xl p-6 text-center shadow-sm">
                    <div class="text-4xl font-nunito font-black text-momo-main">25:00</div>
                    <div class="w-full h-1 bg-momo-bg rounded-full mt-4 overflow-hidden"><div class="w-1/3 h-full bg-momo-main"></div></div>
                </div>
                <button class="w-full bg-momo-main text-white py-4 rounded-xl font-black text-sm">START</button>
            </div>
        </div>
    </main>

    <footer class="text-center py-12 text-sm font-bold text-momo-main/40">
        <p>© 2026 Momo Timer. All rights reserved.</p>
    </footer>

</body>
</html>
